services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chunking-docs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-chunking_docs}"
      POSTGRES_USER: "${POSTGRES_USER:-chunking_docs}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-chunking_docs}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${POSTGRES_DATA_PATH:-./.local/postgres}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
